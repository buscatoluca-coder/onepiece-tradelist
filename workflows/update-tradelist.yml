name: Update Trade List

on:
  repository_dispatch:
    types: [update-tradelist]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo PUBBLICO
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TRADELIST_REPO }}
          token: ${{ secrets.TRADELIST_DEPLOY_TOKEN }}
          path: tradelist-public

      - name: Fetch dati da Web App Apps Script
        env:
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: |
          echo "Fetching trade list..."
          curl -sL "${WEBAPP_URL}?page=tradelist" \
               -H "User-Agent: GitHub-Actions" \
               -o tradelist-public/tradelist_data.json

          # Verifica che il JSON sia valido
          python3 -c "
          import json, sys
          with open('tradelist-public/tradelist_data.json') as f:
              data = json.load(f)
          print(f'OK: {data.get(\"total\",0)} carte, {len(data.get(\"bySet\",[]))} set')
          "

      - name: Commit e push sul repo pubblico
        run: |
          cd tradelist-public
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add tradelist_data.json
          
          # Commit solo se ci sono modifiche
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai dati — skip commit."
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M UTC')
            git commit -m "Update trade list — ${TIMESTAMP}"
            git push
            echo "Push completato."
          fi
